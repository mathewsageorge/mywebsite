<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ansukutty 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Lato:wght@300;400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0a1a;
    --deep: #12102a;
    --blush: #f7c5d5;
    --rose: #e8899a;
    --crimson: #c0435a;
    --gold: #f0c060;
    --gold-dim: #c89a30;
    --white: #fff8f8;
    --muted: rgba(247,197,213,0.55);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor {
    position: fixed; top: 0; left: 0; width: 18px; height: 18px;
    background: var(--rose); border-radius: 50%; pointer-events: none;
    transform: translate(-50%,-50%); z-index: 9999;
    transition: transform .15s ease, background .2s;
    mix-blend-mode: screen;
  }
  #cursor-trail {
    position: fixed; top: 0; left: 0; width: 36px; height: 36px;
    border: 1.5px solid var(--blush); border-radius: 50%; pointer-events: none;
    transform: translate(-50%,-50%); z-index: 9998;
    transition: transform .35s ease, left .35s ease, top .35s ease;
    opacity: .5;
  }

  /* ── CANVAS HEARTS ── */
  #heart-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── SECTIONS ── */
  section { position: relative; z-index: 1; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    background: radial-gradient(ellipse at 50% 60%, #2a0e1e 0%, var(--navy) 70%);
  }

  .hero-eyebrow {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem,3vw,1.6rem);
    color: var(--gold);
    letter-spacing: .12em;
    opacity: 0; animation: fadeUp .9s .3s forwards;
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem,12vw,9rem);
    font-weight: 700; line-height: 1;
    background: linear-gradient(135deg, var(--blush), var(--rose), var(--gold), var(--blush));
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gradShift 5s ease infinite, fadeUp .9s .6s both;
  }

  .hero-tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem,2.5vw,1.35rem);
    color: var(--muted);
    margin-top: .75rem;
    opacity: 0; animation: fadeUp .9s 1s forwards;
  }

  .hero-scroll {
    margin-top: 3.5rem;
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    opacity: 0; animation: fadeUp .9s 1.5s forwards;
    cursor: pointer;
  }
  .hero-scroll span {
    font-size: .72rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--rose); opacity: .7;
  }
  .scroll-dot {
    width: 2px; height: 48px;
    background: linear-gradient(to bottom, var(--rose), transparent);
    animation: scrollPulse 1.8s ease-in-out infinite;
  }

  /* ── TYPEWRITER LETTER ── */
  #letter-section {
    padding: 8rem 2rem;
    display: flex; justify-content: center;
    background: linear-gradient(180deg, var(--navy) 0%, #160d1d 50%, var(--navy) 100%);
  }

  .letter-card {
    max-width: 680px; width: 100%;
    background: rgba(255,248,248,.04);
    border: 1px solid rgba(247,197,213,.15);
    border-radius: 2px;
    padding: clamp(2rem,6vw,4rem);
    position: relative;
  }
  .letter-card::before {
    content: ''; position: absolute; inset: 6px;
    border: 1px solid rgba(247,197,213,.07); border-radius: 1px; pointer-events: none;
  }

  .letter-date {
    font-size: .75rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 2rem; opacity: .8;
  }

  .letter-salutation {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.5rem,4vw,2.2rem);
    color: var(--blush); margin-bottom: 1.5rem;
  }

  #typewriter-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(.95rem,2vw,1.1rem);
    line-height: 2;
    color: rgba(255,248,248,.85);
    min-height: 12em;
  }

  #typewriter-text .cursor-blink {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--rose); vertical-align: text-bottom;
    animation: blink .7s step-end infinite;
  }

  .letter-sign {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem,3.5vw,1.9rem);
    color: var(--gold); margin-top: 2.5rem;
    opacity: 0; transition: opacity 1s;
  }

  /* ── REASONS ACCORDION ── */
  #reasons-section {
    padding: 7rem 2rem;
    max-width: 700px; margin: 0 auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem,5vw,3rem);
    text-align: center; margin-bottom: .5rem;
    color: var(--blush);
  }
  .section-sub {
    text-align: center; color: var(--muted);
    font-size: .9rem; letter-spacing: .15em;
    text-transform: uppercase; margin-bottom: 3.5rem;
  }

  .reason-item {
    border-bottom: 1px solid rgba(247,197,213,.12);
    overflow: hidden;
  }

  .reason-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem .25rem; cursor: pointer;
    transition: color .3s;
  }
  .reason-header:hover .reason-num { color: var(--gold); }
  .reason-header:hover .reason-title { color: var(--rose); }

  .reason-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
    color: rgba(247,197,213,.18); transition: color .3s;
    min-width: 52px;
  }
  .reason-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem,2.5vw,1.2rem);
    color: var(--white); flex: 1; margin-left: 1rem;
    transition: color .3s;
  }
  .reason-icon {
    font-size: 1.1rem; transition: transform .4s;
  }
  .reason-item.open .reason-icon { transform: rotate(45deg); }

  .reason-body {
    max-height: 0; overflow: hidden;
    transition: max-height .5s cubic-bezier(.4,0,.2,1), padding .4s;
    font-size: .97rem; line-height: 1.9;
    color: rgba(255,248,248,.7); padding-left: 52px; padding-right: 1rem;
  }
  .reason-item.open .reason-body { max-height: 200px; padding-bottom: 1.2rem; }

  /* ── STAR WISH SECTION ── */
  #wish-section {
    padding: 7rem 2rem 8rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, var(--navy) 65%);
    position: relative; overflow: hidden;
  }

  #star-field {
    position: absolute; inset: 0; pointer-events: none;
  }

  .wish-prompt {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem,2.5vw,1.25rem);
    color: var(--muted); max-width: 480px;
    margin: 1rem auto 2.5rem;
  }

  #wish-input {
    background: transparent;
    border: none; border-bottom: 1.5px solid rgba(247,197,213,.35);
    color: var(--white); font-family: 'Playfair Display', serif;
    font-style: italic; font-size: clamp(1rem,2.5vw,1.2rem);
    text-align: center; padding: .6rem 1rem; width: min(420px,90%);
    outline: none; transition: border-color .3s;
  }
  #wish-input:focus { border-color: var(--rose); }
  #wish-input::placeholder { color: rgba(247,197,213,.3); }

  #launch-btn {
    display: block; margin: 2.5rem auto 0;
    background: linear-gradient(135deg, var(--crimson), #8b1a35);
    color: var(--white); border: none;
    font-family: 'Lato', sans-serif; font-size: .82rem;
    letter-spacing: .25em; text-transform: uppercase;
    padding: 1rem 2.6rem; border-radius: 50px; cursor: pointer;
    transition: transform .25s, box-shadow .25s;
    box-shadow: 0 0 30px rgba(192,67,90,.3);
  }
  #launch-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(192,67,90,.5);
  }

  #wish-display {
    margin-top: 3rem; min-height: 3rem;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem,4vw,2rem);
    color: var(--gold);
    opacity: 0; transition: opacity 1.2s;
  }

  /* ── MUSIC TOGGLE ── */
  #music-btn {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(232,137,154,.18); border: 1px solid var(--rose);
    color: var(--rose); font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .3s, transform .3s;
    backdrop-filter: blur(8px);
  }
  #music-btn:hover { background: rgba(232,137,154,.32); transform: scale(1.1); }

  /* ── PETAL BURST (click effect) ── */
  .petal {
    position: fixed; pointer-events: none; z-index: 200;
    font-size: 1rem; animation: petalFly .9s forwards;
  }

  /* ── FOOTER ── */
  footer {
    padding: 3rem 2rem;
    text-align: center;
    border-top: 1px solid rgba(247,197,213,.08);
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem; color: var(--rose); opacity: .7;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes scrollPulse {
    0%,100% { opacity:.3; transform: scaleY(1); }
    50%      { opacity:1;  transform: scaleY(1.15); }
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  @keyframes petalFly {
    0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity:0; transform: translate(var(--dx),var(--dy)) scale(.4) rotate(var(--rot)); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-trail"></div>

<!-- Canvas for floating hearts -->
<canvas id="heart-canvas"></canvas>

<!-- ══ HERO ══ -->
<section id="hero">
  <p class="hero-eyebrow">a love story written just for you</p>
  <h1 class="hero-name">Ansukutty</h1>
  <p class="hero-tagline">You are my favourite everything.</p>
  <div class="hero-scroll" onclick="document.getElementById('letter-section').scrollIntoView({behavior:'smooth'})">
    <div class="scroll-dot"></div>
    <span>scroll down</span>
  </div>
</section>

<!-- ══ LOVE LETTER ══ -->
<section id="letter-section">
  <div class="letter-card">
    <p class="letter-date" id="letter-date"></p>
    <p class="letter-salutation">My dearest Ansukutty,</p>
    <div id="typewriter-text"><span class="cursor-blink"></span></div>
    <p class="letter-sign" id="letter-sign">— Yours, always 🌹</p>
  </div>
</section>

<!-- ══ REASONS I LOVE YOU ══ -->
<section id="reasons-section">
  <h2 class="section-title">Why I love you</h2>
  <p class="section-sub">tap each one to unfold</p>

  <div id="reasons-list"></div>
</section>

<!-- ══ WISH ON A STAR ══ -->
<section id="wish-section">
  <canvas id="star-field"></canvas>
  <h2 class="section-title" style="position:relative">Make a wish 🌠</h2>
  <p class="wish-prompt" style="position:relative">
    Type your wish and send it up into the universe for us.
  </p>
  <input id="wish-input" type="text" placeholder="write your wish here…" maxlength="80" style="position:relative">
  <button id="launch-btn">✦ Send to the Stars</button>
  <div id="wish-display"></div>
</section>

<!-- ══ FOOTER ══ -->
<footer>
  Made with every heartbeat, for you — Ansukutty 💕
</footer>

<!-- Music toggle (ambient tone via WebAudio) -->
<button id="music-btn" title="Toggle music">♪</button>

<script>
// ─────────────────────────────────────────
//  CURSOR
// ─────────────────────────────────────────
const cursor = document.getElementById('cursor');
const trail  = document.getElementById('cursor-trail');
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  setTimeout(() => {
    trail.style.left = mx + 'px';
    trail.style.top  = my + 'px';
  }, 100);
});

// ─────────────────────────────────────────
//  PETAL BURST ON CLICK
// ─────────────────────────────────────────
const symbols = ['❤','💕','✦','🌸','💗','✿','♡'];
document.addEventListener('click', e => {
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = e.clientX + 'px';
    p.style.top  = e.clientY + 'px';
    const angle = Math.random() * 360;
    const dist  = 60 + Math.random() * 90;
    p.style.setProperty('--dx', Math.cos(angle*Math.PI/180)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle*Math.PI/180)*dist+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
});

// ─────────────────────────────────────────
//  FLOATING HEARTS CANVAS
// ─────────────────────────────────────────
(function(){
  const canvas = document.getElementById('heart-canvas');
  const ctx = canvas.getContext('2d');
  let hearts = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function heartPath(ctx, x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size * .3);
    ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size * .3);
    ctx.bezierCurveTo(x - size / 2, y + size * .6, x, y + size * .9, x, y + size);
    ctx.bezierCurveTo(x, y + size * .9, x + size / 2, y + size * .6, x + size / 2, y + size * .3);
    ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size * .3);
    ctx.closePath();
  }

  for (let i = 0; i < 22; i++) {
    hearts.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight + window.innerHeight,
      size: 6 + Math.random() * 14,
      speed: .25 + Math.random() * .6,
      drift: (Math.random() - .5) * .4,
      opacity: .08 + Math.random() * .18,
      phase: Math.random() * Math.PI * 2
    });
  }

  let frame = 0;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    hearts.forEach(h => {
      h.y -= h.speed;
      h.x += Math.sin(frame * .01 + h.phase) * h.drift;
      if (h.y + h.size * 1.5 < 0) {
        h.y = canvas.height + 20;
        h.x = Math.random() * canvas.width;
      }
      const colors = ['#f7c5d5','#e8899a','#f0c060','#c0435a'];
      ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
      ctx.globalAlpha = h.opacity;
      heartPath(ctx, h.x - h.size/2, h.y - h.size*0.5, h.size);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();
})();

// ─────────────────────────────────────────
//  LETTER DATE
// ─────────────────────────────────────────
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('letter-date').textContent =
  months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

// ─────────────────────────────────────────
//  TYPEWRITER
// ─────────────────────────────────────────
const letterText = `From the very first moment I met you, I knew something had quietly shifted inside me — like the universe decided to finally make sense. You carry this warmth with you, Ansukutty, the kind that fills a room before you even speak. It is in the way your eyes light up when you laugh, the way you listen like every word matters, the way you make ordinary days feel like something worth remembering. I do not have perfect words for what you mean to me. But I know that loving you feels like coming home to a place I never knew I was missing. Thank you for being exactly who you are.`;

(function typeIt() {
  const el  = document.getElementById('typewriter-text');
  const sign = document.getElementById('letter-sign');
  let i = 0;

  const observer = new IntersectionObserver(entries => {
    if (!entries[0].isIntersecting) return;
    observer.disconnect();

    function next() {
      if (i <= letterText.length) {
        el.innerHTML = letterText.slice(0, i).replace(/\n/g,'<br>')
          + '<span class="cursor-blink"></span>';
        i++;
        setTimeout(next, i < letterText.length ? 28 : 0);
      } else {
        el.innerHTML = letterText;
        sign.style.opacity = '1';
      }
    }
    next();
  }, { threshold: .3 });

  observer.observe(document.getElementById('letter-section'));
})();

// ─────────────────────────────────────────
//  REASONS ACCORDION
// ─────────────────────────────────────────
const reasons = [
  { title: "Your laugh",        body: "It is completely contagious and genuinely the best sound in the world. When you laugh — really laugh — I forget everything else exists." },
  { title: "Your kindness",     body: "You see people. Really see them. Your empathy is not a performance; it is just who you are, and it makes everyone around you feel less alone." },
  { title: "Your strength",     body: "You carry hard things with so much quiet grace. Watching you navigate life with courage and softness at the same time humbles me every day." },
  { title: "The way you care",  body: "You remember the small things — the things I mentioned once in passing. Somehow you hold all of them, and that tells me everything about your heart." },
  { title: "Your mind",         body: "Talking with you is never boring. You think deeply, question thoughtfully, and you are never afraid to say what you actually feel." },
  { title: "Your presence",     body: "Just being near you is enough. You have this rare quality of making silence feel comfortable, and company feel like shelter." },
  { title: "The life you make", body: "Wherever you go, you make things more beautiful without even trying. My world is immeasurably better for having you in it." },
];

const list = document.getElementById('reasons-list');
reasons.forEach((r, i) => {
  const div = document.createElement('div');
  div.className = 'reason-item';
  div.innerHTML = `
    <div class="reason-header" role="button" tabindex="0" aria-expanded="false">
      <span class="reason-num">${String(i+1).padStart(2,'0')}</span>
      <span class="reason-title">${r.title}</span>
      <span class="reason-icon">+</span>
    </div>
    <div class="reason-body">${r.body}</div>`;

  const header = div.querySelector('.reason-header');
  const toggle = () => {
    const open = div.classList.toggle('open');
    header.setAttribute('aria-expanded', open);
    list.querySelectorAll('.reason-item').forEach(el => {
      if (el !== div) { el.classList.remove('open'); el.querySelector('.reason-header').setAttribute('aria-expanded','false'); }
    });
  };
  header.addEventListener('click', toggle);
  header.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') toggle(); });
  list.appendChild(div);
});

// ─────────────────────────────────────────
//  STAR FIELD
// ─────────────────────────────────────────
(function(){
  const canvas = document.getElementById('star-field');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    stars = Array.from({length:120}, () => ({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.4+.3, a: Math.random(), phase: Math.random()*Math.PI*2
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  let f = 0;
  (function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    f += .015;
    stars.forEach(s => {
      const alpha = .3 + .7 * (.5 + .5*Math.sin(f + s.phase));
      ctx.fillStyle = `rgba(255,248,248,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(loop);
  })();
})();

// ─────────────────────────────────────────
//  WISH LAUNCHER
// ─────────────────────────────────────────
document.getElementById('launch-btn').addEventListener('click', () => {
  const val = document.getElementById('wish-input').value.trim();
  if (!val) return;
  const disp = document.getElementById('wish-display');
  disp.textContent = '✦ "' + val + '" ✦';
  disp.style.opacity = '0';
  requestAnimationFrame(() => { disp.style.opacity = '1'; });

  // burst of hearts from button
  const btn = document.getElementById('launch-btn');
  const r   = btn.getBoundingClientRect();
  const cx  = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i=0; i<18; i++) {
    const p = document.createElement('div');
    p.className = 'petal'; p.textContent = '✦';
    p.style.left = cx+'px'; p.style.top = cy+'px'; p.style.color = '#f0c060';
    const a = (i/18)*2*Math.PI;
    const d = 80 + Math.random()*80;
    p.style.setProperty('--dx', Math.cos(a)*d+'px');
    p.style.setProperty('--dy', Math.sin(a)*d+'px');
    p.style.setProperty('--rot','0deg');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
});

document.getElementById('wish-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('launch-btn').click();
});

// ─────────────────────────────────────────
//  AMBIENT MUSIC (Web Audio)
// ─────────────────────────────────────────
let audioCtx = null, playing = false, gainNode = null;
const NOTE_FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
const MELODY = [0,2,4,2,5,4,2,0,4,5,4,2,0,2,4,7];

function startAmbient() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(.12, audioCtx.currentTime + 1.5);
  gainNode.connect(audioCtx.destination);

  // Pad chord
  [261.63, 329.63, 392.00, 493.88].forEach(freq => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = .03;
    osc.connect(g); g.connect(gainNode);
    osc.start();
  });

  // Melody
  let t = audioCtx.currentTime + .5;
  function scheduleMelody() {
    MELODY.forEach((n,i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = NOTE_FREQS[n] * 2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, t + i * .55);
      g.gain.linearRampToValueAtTime(.07, t + i * .55 + .05);
      g.gain.exponentialRampToValueAtTime(.001, t + i * .55 + .5);
      osc.connect(g); g.connect(gainNode);
      osc.start(t + i * .55);
      osc.stop(t + i * .55 + .55);
    });
    t += MELODY.length * .55;
    loopTimer = setTimeout(scheduleMelody, (t - audioCtx.currentTime - 1) * 1000);
  }
  scheduleMelody();
}

let loopTimer = null;

document.getElementById('music-btn').addEventListener('click', () => {
  if (!playing) {
    startAmbient();
    playing = true;
    document.getElementById('music-btn').textContent = '♫';
    document.getElementById('music-btn').style.color = 'var(--gold)';
  } else {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    clearTimeout(loopTimer);
    playing = false;
    document.getElementById('music-btn').textContent = '♪';
    document.getElementById('music-btn').style.color = 'var(--rose)';
  }
});

// ─────────────────────────────────────────
//  SCROLL REVEAL
// ─────────────────────────────────────────
const revealEls = document.querySelectorAll('#reasons-section, #wish-section');
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity = '1';
      e.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: .1 });

revealEls.forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(40px)';
  el.style.transition = 'opacity .9s ease, transform .9s ease';
  revealObs.observe(el);
});
</script>
</body>
